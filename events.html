<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moonveil — Hub Central</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%2308001a'/><rect x='4' y='4' width='24' height='24' rx='2' fill='%23c026d3'/><text x='16' y='22' text-anchor='middle' fill='%2308001a' font-size='14' font-weight='bold'>M</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Orbitron:wght@400;700;900&display=swap">
  <link rel="stylesheet" href="events.css"/>
</head>
<body>

<div class="scanlines" aria-hidden="true"></div>
<canvas id="stars-canvas" class="stars-canvas" aria-hidden="true"></canvas>

<!-- LOADER -->
<div id="loader">
  <div class="loader-pixel">
    <div class="ld-char">🌌</div>
    <div class="ld-text">CARGANDO HUB...</div>
    <div class="ld-bar"><div class="ld-fill" id="ld-fill"></div></div>
  </div>
</div>

<!-- HEADER — estilo morado -->
<header class="header">
  <div class="container nav-wrap">
    <div class="nav-brand">
      <div class="brand-cube-sm"></div>
      <span class="logo">Moon<span>veil</span></span>
    </div>
    <nav class="nav" id="main-nav">
      <a href="inicio.html"   class="nav-pill np-home">🏠 INICIO</a>
      <a href="events.html"   class="nav-pill np-hub active">🌌 HUB</a>
      <a href="perfiles.html" class="nav-pill np-perfil">👤 PERFIL</a>
    </nav>
    <div class="nav-cta">
      <div class="nav-user-info" id="nav-user-info">
        <span class="nav-avatar" id="nav-avatar">🌙</span>
        <span class="nav-username" id="nav-username">EXPLORADOR</span>
        <span class="xp-badge" id="xp-display">⚡ 0 XP</span>
      </div>
      <button class="btn btn-logout" id="btn-logout">✕ SALIR</button>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- HERO — estilo morado v5 -->
<section class="hub-hero">
  <div class="hero-bg-grid" aria-hidden="true"></div>
  <div class="hero-orb hero-orb-1" aria-hidden="true"></div>
  <div class="hero-orb hero-orb-2" aria-hidden="true"></div>
  <div class="hero-sparks" aria-hidden="true">
    <span class="hs hs-1">✦</span>
    <span class="hs hs-2">◈</span>
    <span class="hs hs-3">✦</span>
    <span class="hs hs-4">◆</span>
    <span class="hs hs-5">✧</span>
    <span class="hs hs-6">◈</span>
  </div>
  <div class="hero-content container">
    <div class="hero-kicker">
      <span class="kicker-line"></span>
      <span class="kicker-text">PORTAL MOONVEIL</span>
      <span class="kicker-line"></span>
    </div>
    <h1 class="hub-title">
      <span class="ht-row">HUB</span>
      <span class="ht-row ht-accent">CENTRAL</span>
    </h1>
    <p class="hub-sub">▸ TODAS LAS SECCIONES DEL PORTAL ◂</p>
    <div class="hero-counter">
      <span class="hc-dot"></span>
      <span class="hc-num" id="heroBadgeCount">—</span>
      <span class="hc-label">SECCIONES ACTIVAS</span>
      <span class="hc-dot"></span>
    </div>
  </div>
</section>

<!-- MAIN — tarjetas estilo espacial azul -->
<main class="hub-main" role="main">
  <div class="hub-body" id="hubBody"></div>
</main>

<footer class="hub-footer">
  <div class="container footer-inner">
    <span class="footer-brand">🌌 Moonveil Portal · Hub Central</span>
    <span class="footer-yr" id="footerYear"></span>
  </div>
</footer>

<div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
<button class="back-to-top" id="back-top" title="Volver arriba">▲</button>

<script type="module" src="events.js"></script>
</body>
</html>
