<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moonveil — Hub de Secciones</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23030a1a'/><rect x='4' y='4' width='24' height='24' rx='2' fill='%2300d4ff'/><text x='16' y='22' text-anchor='middle' fill='%23030a1a' font-size='14' font-weight='bold'>M</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Orbitron:wght@400;700;900&display=swap">
  <link rel="stylesheet" href="events.css"/>
</head>
<body>

<div class="scanlines" aria-hidden="true"></div>
<canvas id="stars-canvas" class="stars-canvas" aria-hidden="true"></canvas>

<!-- LOADER -->
<div id="loader">
  <div class="loader-pixel">
    <div class="ld-char">🌌</div>
    <div class="ld-text">CARGANDO HUB...</div>
    <div class="ld-bar"><div class="ld-fill" id="ld-fill"></div></div>
  </div>
</div>

<!-- HEADER -->
<header class="header">
  <div class="container nav-wrap">
    <div class="nav-brand">
      <div class="brand-cube-sm"></div>
      <span class="logo">Moon<span>veil</span></span>
    </div>

    <nav class="nav" id="main-nav">
      <a href="inicio.html"   class="nav-pill np-home">🏠 INICIO</a>
      <a href="events.html"   class="nav-pill np-hub active">🌌 HUB</a>
      <a href="perfiles.html" class="nav-pill np-perfil">👤 PERFIL</a>
    </nav>

    <!-- Solo info de usuario, sin botón salir -->
    <div class="nav-cta">
      <div class="nav-user-info" id="nav-user-info">
        <span class="nav-avatar" id="nav-avatar">🌙</span>
        <span class="nav-username" id="nav-username">EXPLORADOR</span>
        <span class="xp-badge" id="xp-display">⚡ 0 XP</span>
      </div>
    </div>

    <button class="hamburger" id="hamburger" aria-label="Abrir menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- MAIN -->
<main class="hub-main" role="main">

  <!-- Hero -->
  <section class="hub-hero">
    <div class="hero-stars-deco" aria-hidden="true">
      <span class="hsd-1">✦</span>
      <span class="hsd-2">★</span>
      <span class="hsd-3">✦</span>
      <span class="hsd-4">☆</span>
      <span class="hsd-5">✧</span>
    </div>
    <h1 class="hub-title">
      <span class="ht-line">MOONVEIL</span>
      <span class="ht-line ht-accent">HUB CENTRAL</span>
    </h1>
    <p class="hub-subtitle">▸ TODAS LAS SECCIONES DEL PORTAL ◂</p>
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      <span><b id="heroBadgeCount">—</b> secciones activas ahora mismo</span>
    </div>
  </section>

  <!-- Tarjetas generadas por events.js -->
  <div class="hub-body" id="hubBody"></div>

</main>

<footer class="hub-footer">
  <p>🌌 Moonveil Portal · Hub Central · <span id="footerYear"></span></p>
</footer>

<div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
<button class="back-to-top" id="back-top" title="Volver arriba">▲</button>

<script type="module" src="events.js"></script>
</body>
</html>
